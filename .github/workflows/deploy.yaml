name: Deploy Portfolio Website

on:
  push:
    branches:
      - main  # Triggers the pipeline whenever you push to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Pull down your latest code from GitHub
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Set up Node.js environment
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-level: 20

    # 3. Install dependencies and build React app
    - name: Install & Build
      env:
        VITE_API_URL: ${{ secrets.VITE_API_URL }}
      run: |
        npm install
        npm run build

    # 4. Configure AWS Credentials safely using GitHub Secrets
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: eu-north-1

    # 5. Sync the 'dist' folder directly to your S3 Bucket
    - name: Deploy to S3
      run: |
        aws s3 sync dist/ s3://kanzafat.portfolio.com --delete

    # 6. Invalidate CloudFront Cache (Tells AWS to stop showing old files)
    - name: Invalidate CloudFront Cache
      run: |
        aws cloudfront create-invalidation --distribution-id d32rk42wstdr21.cloudfront.net --paths "/*"